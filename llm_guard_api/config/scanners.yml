app:
  name: "InsightGig LLM Guard"
  log_level: INFO
  log_json: true
  scan_fail_fast: false
  scan_prompt_timeout: 30
  scan_output_timeout: 30
  lazy_load: false  # Pre-load models at startup for faster response

auth:
  type: http_bearer
  token: ${AUTH_TOKEN}

# Phase 1 Input Scanners
input_scanners:
  - type: Anonymize
    params:
      threshold: 0.5
      use_onnx: true  # ONNX for faster inference
      entity_types:
        - CREDIT_CARD
        - EMAIL_ADDRESS
        - PERSON
        - PHONE_NUMBER
        - US_SSN
        - IP_ADDRESS
        - IBAN_CODE
        - CRYPTO
        - US_BANK_NUMBER
        - UUID

  - type: Secrets
    params:
      redact_mode: partial  # Show partial value for context

# Phase 1 Output Scanners
output_scanners:
  - type: Deanonymize
    params:
      matching_strategy: exact  # Exact match for placeholder replacement

  - type: MaliciousURLs
    params:
      threshold: 0.75
      use_onnx: true  # ONNX for faster inference